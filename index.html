<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OneX Notes</title>
    <style>
        body {
            margin: 0; padding: 0;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            background: #000;
            overflow: hidden;
        }

        /* Hintergrund-Animation (Blobs) */
        .blob-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; filter: blur(120px);
        }
        .blob {
            position: absolute; border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            animation: move 20s infinite alternate ease-in-out;
        }
        .blob-1 { width: 600px; height: 600px; top: -10%; left: -10%; }
        .blob-2 { width: 500px; height: 500px; bottom: -5%; right: -5%; animation-delay: -5s; }

        @keyframes move {
            0% { transform: translate(0, 0); }
            100% { transform: translate(150px, 100px); }
        }

        /* Die Notiz-Box (Liquid Glass) */
        .main-container {
            width: 90%; max-width: 850px; height: 70vh;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; flex-direction: column;
            padding: 40px; box-sizing: border-box;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            position: relative;
        }

        .logo-header {
            margin-bottom: 25px; align-self: center;
            width: 90px; opacity: 0.85;
        }
        .logo-header img { width: 100%; height: auto; }

        #editor {
            width: 100%; flex-grow: 1;
            background: transparent; border: none;
            color: #fff; font-size: 1.3rem; line-height: 1.8;
            outline: none; resize: none; font-weight: 300;
        }

        #editor::placeholder { color: rgba(255, 255, 255, 0.1); }

        /* Das schwebende Social-Dock ganz unten */
        .social-bar {
            position: fixed;
            bottom: 30px;
            display: flex;
            gap: 12px;
            padding: 12px 25px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 100;
        }

        .social-link {
            width: 45px; height: 45px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            display: flex; justify-content: center; align-items: center;
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .social-link:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            transform: translateY(-8px) scale(1.1);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 15px 25px rgba(0,0,0,0.3);
        }

        .status-badge {
            margin-top: 15px; color: rgba(255,255,255,0.15);
            font-size: 0.6rem; letter-spacing: 3px; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="blob-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <!-- Hauptschreibbereich -->
    <div class="main-container">
        <div class="logo-header">
            <img src="IMG_6231-removebg-preview.png" alt="One X">
        </div>
        <textarea id="editor" placeholder="Gedanken..."></textarea>
        <div class="status-badge" id="status">One X Ready</div>
    </div>

    <!-- Schwebende Social-Leiste ganz unten -->
    <div class="social-bar">
        <a href="https://whatsapp.com/channel/0029VbCcLum4IBhMOJTJF61H" class="social-link">WA</a>
        <a href="https://www.tiktok.com/@one.x85?_r=1&_t=ZG-94NdFZvU9dB" class="social-link">TIK</a>
        <a href="https://mikaxpxd.github.io/OneX.web/" class="social-link">GIT</a>
        <a href="https://discord.gg/d5sn96xM" class="social-link">DISC</a>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const status = document.getElementById('status');

        window.onload = () => {
            const saved = localStorage.getItem('onex_final_v4');
            if (saved) editor.value = saved;
        };

        editor.addEventListener('input', () => {
            localStorage.setItem('onex_final_v4', editor.value);
            status.innerText = "Gesichert";
            setTimeout(() => { status.innerText = "One X Ready"; }, 1500);
        });
    </script>

</body>
</html>
